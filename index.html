<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <title>Eventra x Bokontour Rugby Giveaway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #C9A84C;
      --green:    #0D2B1D;
      --surface:  #111111;
      --border:   rgba(201,168,76,0.32);
      --text:     #FFFFFF;
      --muted:    rgba(255,255,255,0.42);
      --offwhite: #CCCCCC;
    }

    html, body {
      min-height: 100%;
      background: var(--green);
      color: var(--text);
      font-family: 'Montserrat', system-ui, sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; }

    /* ════════════════════════════════════
       HERO
    ════════════════════════════════════ */
    .hero {
      width: 100%;
      height: 280px;
      background-image: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=1400');
      background-size: cover;
      background-position: center 38%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }
    .hero-title {
      position: relative;
      z-index: 1;
      font-family: 'Copperplate Gothic', 'Copperplate', 'Big Caslon', Georgia, serif;
      font-size: clamp(1.75rem, 4.5vw, 3.25rem);
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.25;
      padding: 0 24px;
    }

    /* ════════════════════════════════════
       SUBTITLE BAR
    ════════════════════════════════════ */
    .subtitle-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--surface);
      border-bottom: 1px solid var(--gold);
      padding: 16px 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .subtitle-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      color: #FFFFFF;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ════════════════════════════════════
       MAIN
    ════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 52px;
      width: 100%;
      gap: 22px;
    }

    /* Input section — narrower, centred */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 660px;
    }

    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      color: #FFFFFF;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      line-height: 1.8;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); font-style: italic; }
    textarea:focus { border-color: var(--gold); }

    .name-count {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-align: right;
    }
    .name-count span { color: #FFFFFF; font-weight: 400; }

    .btn-pick {
      width: 100%;
      padding: 15px 20px;
      background: transparent;
      border: 1px solid var(--gold);
      border-radius: 0;
      color: #FFFFFF;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s;
    }
    .btn-pick:hover:not(:disabled) { background: rgba(201,168,76,0.1); }
    .btn-pick:active:not(:disabled) { background: rgba(201,168,76,0.2); }
    .btn-pick:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ════════════════════════════════════
       DRAW ROW — logos flanking the stage
    ════════════════════════════════════ */
    .draw-row {
      display: flex;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 980px;
    }

    .side-logo {
      flex-shrink: 0;
      opacity: 0.42;
    }
    .side-logo img { width: 80px; display: block; }

    /* ════════════════════════════════════
       DRAW STAGE
    ════════════════════════════════════ */
    .draw-stage {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 52px 36px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 480px;
      transition: border-color 0.5s, box-shadow 0.5s;
    }
    .draw-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 68%);
      pointer-events: none;
    }
    .draw-stage.won {
      border-color: var(--gold);
      box-shadow: 0 0 60px rgba(201,168,76,0.12);
    }

    /* Placeholder */
    .placeholder-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      pointer-events: none;
    }
    .placeholder-logo { width: 90px; opacity: 0.28; }
    .placeholder-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    /* Drawing label */
    .draw-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      display: none;
    }

    /* Cycling name */
    .cycling-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.03em;
      line-height: 1.15;
      word-break: break-word;
      padding: 0 12px;
      display: none;
    }

    /* Winner reveal */
    .winner-logo {
      width: 90px;
      display: none;
      margin: 0 auto;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.62rem, 1.5vw, 0.8rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #FFFFFF;
      display: none;
      animation: fadeUp 0.6s 0.08s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(3.8rem, 9vw, 5.5rem);
      color: #FFFFFF;
      letter-spacing: 0.01em;
      line-height: 1.05;
      word-break: break-word;
      overflow-wrap: break-word;
      padding: 0 16px;
      display: none;
      animation: fadeUp 0.7s 0.14s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-name::before,
    .winner-name::after {
      content: '';
      display: block;
      width: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
      margin: 16px auto;
    }
    .giveaway-label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(0.44rem, 1.1vw, 0.56rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--offwhite);
      opacity: 0.55;
      display: none;
      margin-top: 2px;
      animation: fadeUp 0.6s 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      0%   { transform: translateY(14px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    /* Confetti */
    .confetti-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(0)    rotate(0deg);    opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translateY(150%) rotate(1080deg); opacity: 0; }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 18px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.18);
      border-top: 1px solid var(--border);
    }

    /* ════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════ */
    /* Hide side logos when not enough room */
    @media (max-width: 900px) {
      .side-logo { display: none; }
    }

    /* Tablet */
    @media (max-width: 760px) {
      main { padding: 28px 16px 40px; gap: 18px; }
      .draw-stage { padding: 40px 24px 36px; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .hero { height: 200px; }
      .hero-title {
        font-size: clamp(1.1rem, 6.5vw, 1.75rem);
        letter-spacing: 0.18em;
      }
      .subtitle-bar { padding: 13px 16px; }
      .subtitle-text {
        font-size: clamp(0.68rem, 3.5vw, 0.88rem);
        letter-spacing: 0.12em;
      }
      main { padding: 22px 12px 32px; gap: 14px; }
      .input-section { max-width: 100%; }
      textarea { min-height: 110px; font-size: 0.85rem; padding: 12px 14px; }
      .name-count { font-size: 0.65rem; }
      .btn-pick { padding: 14px 16px; font-size: 0.68rem; letter-spacing: 0.18em; }
      .draw-stage { padding: 32px 16px 28px; min-height: 360px; gap: 8px; }
      .placeholder-logo { width: 70px; }
      .cycling-name { font-size: clamp(1.8rem, 8.5vw, 2.6rem); }
      .winner-logo  { width: 70px; }
      .winner-title { font-size: clamp(0.52rem, 2.8vw, 0.7rem); letter-spacing: 0.25em; }
      .winner-name  {
        font-size: clamp(2.4rem, 10.5vw, 3.8rem);
        padding: 0 8px;
      }
      .winner-name::before,
      .winner-name::after { margin: 10px auto; width: 55%; }
      .giveaway-label { font-size: clamp(0.4rem, 1.8vw, 0.52rem); letter-spacing: 0.18em; }
    }

    /* Extra-small */
    @media (max-width: 390px) {
      .hero { height: 175px; }
      .hero-title { font-size: clamp(1rem, 7vw, 1.5rem); letter-spacing: 0.12em; }
      main { padding-left: 10px; padding-right: 10px; }
      .draw-stage { padding: 26px 12px 22px; min-height: 320px; }
      .winner-name { font-size: clamp(2rem, 11vw, 3rem); }
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1 class="hero-title">Eventra Group</h1>
  </section>

  <!-- ── Subtitle bar ── -->
  <div class="subtitle-bar">
    <span class="subtitle-text">Eventra Group &times; Bokontour Giveaway</span>
  </div>

        spellcheck="false"
      ></textarea>
      <div class="name-count" id="nameCount"><span>0</span> names entered</div>
      <button class="btn-pick" id="btnPick" disabled>Pick a Winner</button>
    </div>

  <script>
    const nameInput        = document.getElementById('nameInput');
    const nameCount        = document.getElementById('nameCount');
    const btnPick          = document.getElementById('btnPick');
    const drawStage        = document.getElementById('drawStage');
    const placeholderState = document.getElementById('placeholderState');
    const drawLabel        = document.getElementById('drawLabel');
    const cyclingName      = document.getElementById('cyclingName');
    const winnerName       = document.getElementById('winnerName');
    const winnerTitle      = document.getElementById('winnerTitle');
    const winnerLogo       = document.getElementById('winnerLogo');
    const giveawayLabel    = document.getElementById('giveawayLabel');
    const confettiBurst    = document.getElementById('confettiBurst');

    let names     = [];
    let isDrawing = false;

    function parseNames(raw) {
      return raw.split('\n').map(n => n.trim()).filter(n => n.length > 0);
    }

    function syncNames() {
      names = parseNames(nameInput.value);
      nameCount.querySelector('span').textContent = names.length;
      btnPick.disabled = names.length < 2 || isDrawing;
    }

    // Broad event coverage for desktop typing, mobile paste, autofill, and IME input
    nameInput.addEventListener('input',  syncNames);
    nameInput.addEventListener('change', syncNames);
    nameInput.addEventListener('keyup',  syncNames);
    // paste fires before the value updates — delay by one tick so the value is readable
    nameInput.addEventListener('paste',  () => setTimeout(syncNames, 0));

    btnPick.addEventListener('click', () => {
      // Re-read the textarea fresh at click time — handles mobile browsers that
      // fire paste/input events unreliably, ensuring we never use a stale cache
      syncNames();
      startDraw();
    });

    function startDraw() {
      if (names.length < 2) return;
      isDrawing = true;
      btnPick.disabled = true;

      placeholderState.style.display = 'none';
      winnerLogo.style.display       = 'none';
      winnerTitle.style.display      = 'none';
      winnerName.style.display       = 'none';
      giveawayLabel.style.display    = 'none';
      drawStage.classList.remove('won');
      confettiBurst.innerHTML        = '';

      drawLabel.style.display   = 'block';
      drawLabel.textContent     = 'Drawing\u2026';
      cyclingName.style.display = 'block';
      cyclingName.style.opacity = '1';

      const TOTAL_MS  = 5000;
      const startTime = Date.now();
      let done = false;

      function step() {
        if (done) return;
        const elapsed  = Date.now() - startTime;
        const progress = Math.min(elapsed / TOTAL_MS, 1);

        cyclingName.textContent   = names[Math.floor(Math.random() * names.length)];
        cyclingName.style.opacity = String(Math.max(0.3, 1 - progress * 0.6));

        if (progress >= 1) { done = true; finishDraw(); return; }

        let interval;
        if (progress < 0.6) {
          interval = 50;
        } else {
          const t = (progress - 0.6) / 0.4;
          interval = Math.round(50 + 380 * Math.pow(t, 2.2));
        }
        setTimeout(step, interval);
      }

      setTimeout(() => { if (!done) { done = true; finishDraw(); } }, TOTAL_MS + 700);
      step();
    }

    function finishDraw() {
      const winner = names[Math.floor(Math.random() * names.length)];

      drawLabel.style.display   = 'none';
      cyclingName.style.display = 'none';

      [winnerLogo, winnerTitle, winnerName, giveawayLabel].forEach(el => {
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });

      winnerLogo.style.display    = 'block';
      winnerTitle.style.display   = 'block';
      winnerName.textContent      = winner;
      winnerName.style.display    = 'block';
      giveawayLabel.style.display = 'block';
      drawStage.classList.add('won');

      spawnCelebration();

      isDrawing        = false;
      btnPick.disabled = names.length < 2;
    }

    const CONFETTI_COLORS = [
      '#9B8651','#B09A67','#C8B47C','#D4C090',
      '#FFFFFF','#E8E8E8',
      '#0D2B1D','#1A5C3A','#2E7D52'
    ];

    function spawnCelebration() {
      confettiBurst.innerHTML = '';
      for (let i = 0; i < 180; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 5 + Math.random() * 10;
        const tall = Math.random() > 0.45;
        const dur  = 1.8 + Math.random() * 2.4;
        const del  = Math.random() * 1.0;
        const col  = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        p.style.cssText = [
          `left:${Math.random() * 100}%`,
          `top:${-20 - Math.random() * 20}px`,
          `width:${size}px`,
          `height:${tall ? size * 2.5 : size}px`,
          `background:${col}`,
          `border-radius:${Math.random() > 0.4 ? '50%' : '0'}`,
          `transform:rotate(${Math.random() * 360}deg)`,
          `animation:fall ${dur}s ${del}s linear forwards`,
        ].join(';');
        confettiBurst.appendChild(p);
      }
      const positions = [[20,20],[80,15],[50,10],[15,50],[85,45],[50,35]];
      positions.forEach(([cx, cy], i) => {
        setTimeout(() => launchFirework(cx, cy), i * 250);
      });
    }

    function launchFirework(cx, cy) {
      const color  = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const color2 = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const count  = 22;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const dist  = 55 + Math.random() * 90;
        const dur   = 700 + Math.random() * 500;
        const size  = 4 + Math.random() * 7;
        const fw    = document.createElement('div');
        fw.style.cssText = [
          'position:absolute',
          `left:${cx}%`, `top:${cy}%`,
          `width:${size}px`, `height:${size}px`,
          `background:${i % 2 === 0 ? color : color2}`,
          'border-radius:50%', 'pointer-events:none',
        ].join(';');
        confettiBurst.appendChild(fw);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        fw.animate([
          { transform: 'translate(0,0) scale(0)',                           opacity: 1 },
          { transform: `translate(${tx}px,${ty}px) scale(1)`,               opacity: 0.9, offset: 0.55 },
          { transform: `translate(${tx*1.3}px,${ty*1.3+20}px) scale(0.2)`, opacity: 0 },
        ], { duration: dur, fill: 'forwards', easing: 'ease-out' });
      }
    }
  </script>
