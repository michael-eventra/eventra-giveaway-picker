<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Eventra Group Giveaway</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Eventra Group brand tokens */
      --gold:       #9D8D61;   /* Gold 100 - primary brand gold */
      --gold-soft:  #B4A67E;
      --paper:      #F4EFE3;   /* Paper Ivory - the field */
      --paper-soft: #FAF7F1;   /* Paper Soft */
      --sand:       #ECE6D8;   /* Paper Sand - feature blocks */
      --ink:        #1A1A1A;   /* Ink - primary text */
      --ink-muted:  #8C857A;   /* Ink Muted */
      --line:       rgba(157,141,97,0.30);  /* soft gold hairline */
      --line-soft:  rgba(26,26,26,0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; flex-direction: column; }

    /* Small utility: gold rule kicker */
    .kicker-rule {
      width: 34px; height: 2px; background: var(--gold);
      margin: 0 auto 14px;
    }

    /* ════════════════════════════════════
       HERO
    ════════════════════════════════════ */
    .hero {
      width: 100%;
      padding: 52px 24px 30px;
      background: var(--paper);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-align: center;
    }
    .hero-lockup {
      width: min(520px, 82%);
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ════════════════════════════════════
       SUBTITLE BAR
    ════════════════════════════════════ */
    .subtitle-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--paper-soft);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 15px 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .subtitle-text {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(0.62rem, 1.6vw, 0.74rem);
      color: var(--gold);
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    /* ════════════════════════════════════
       MAIN
    ════════════════════════════════════ */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 42px 20px 56px;
      width: 100%;
      gap: 24px;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 660px;
    }

    .section-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.64rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
    }

    textarea {
      width: 100%;
      min-height: 130px;
      background: var(--paper-soft);
      border: 1px solid var(--line);
      border-radius: 0;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.9rem;
      line-height: 1.8;
      padding: 15px 17px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    textarea::placeholder { color: var(--ink-muted); font-style: normal; }
    textarea:focus { border-color: var(--gold); background: #fff; }

    .name-count {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      text-align: right;
      text-transform: uppercase;
    }
    .name-count span { color: var(--ink); font-weight: 600; }

    .btn-pick {
      width: 100%;
      padding: 16px 20px;
      background: var(--ink);
      border: 1px solid var(--ink);
      border-radius: 0;
      color: var(--paper);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
    }
    .btn-pick:hover:not(:disabled)  { background: var(--gold); border-color: var(--gold); color: #fff; }
    .btn-pick:active:not(:disabled) { background: var(--gold-soft); border-color: var(--gold-soft); }
    .btn-pick:disabled { opacity: 0.28; cursor: not-allowed; }

    /* ════════════════════════════════════
       DRAW ROW
    ════════════════════════════════════ */
    .draw-row {
      display: flex;
      align-items: center;
      gap: 34px;
      width: 100%;
      max-width: 980px;
    }
    .side-logo { flex-shrink: 0; opacity: 0.5; }
    .side-logo img { width: 74px; display: block; }

    /* ════════════════════════════════════
       DRAW STAGE
    ════════════════════════════════════ */
    .draw-stage {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: var(--paper-soft);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 54px 36px 50px;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 480px;
      transition: border-color 0.5s, box-shadow 0.5s, background 0.5s;
    }
    .draw-stage.won {
      border-color: var(--gold);
      background: var(--sand);
      box-shadow: 0 0 0 1px var(--gold) inset;
    }

    .placeholder-state {
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      pointer-events: none;
    }
    .placeholder-logo { width: 82px; opacity: 0.55; }
    .placeholder-text {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.62rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .draw-label {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.64rem;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
      display: none;
    }

    .cycling-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(2.2rem, 5.5vw, 3.5rem);
      color: var(--ink);
      letter-spacing: 0.01em;
      line-height: 1.15;
      word-break: break-word;
      padding: 0 12px;
      display: none;
    }

    .winner-logo {
      width: 78px; display: none; margin: 0 auto;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-title {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: clamp(0.6rem, 1.5vw, 0.72rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      display: none;
      animation: fadeUp 0.6s 0.08s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 700;
      font-size: clamp(3.6rem, 9vw, 5.4rem);
      color: var(--ink);
      letter-spacing: 0.005em;
      line-height: 1.05;
      word-break: break-word;
      overflow-wrap: break-word;
      padding: 0 16px;
      display: none;
      animation: fadeUp 0.7s 0.14s cubic-bezier(0.22,1,0.36,1) both;
    }
    .winner-name::before, .winner-name::after {
      content: '';
      display: block;
      width: 46%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 50%, transparent 100%);
      margin: 18px auto;
    }
    .giveaway-label {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: clamp(0.46rem, 1.1vw, 0.58rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-muted);
      display: none;
      margin-top: 2px;
      animation: fadeUp 0.6s 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      0%   { transform: translateY(14px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }

    .confetti-burst { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .particle { position: absolute; animation: fall linear forwards; }
    @keyframes fall {
      0%   { transform: translateY(0)    rotate(0deg);    opacity: 1; }
      75%  { opacity: 1; }
      100% { transform: translateY(150%) rotate(1080deg); opacity: 0; }
    }

    footer {
      text-align: center;
      padding: 20px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      border-top: 1px solid var(--line);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) { .side-logo { display: none; } }
    @media (max-width: 760px) {
      main { padding: 34px 16px 44px; gap: 20px; }
      .draw-stage { padding: 42px 24px 38px; }
    }
    @media (max-width: 600px) {
      .hero { padding: 34px 16px 22px; }
      .hero-lockup { width: 88%; }
      .subtitle-bar { padding: 12px 16px; }
      .subtitle-text { font-size: clamp(0.56rem, 3vw, 0.68rem); letter-spacing: 0.16em; }
      main { padding: 26px 12px 34px; gap: 16px; }
      .input-section { max-width: 100%; }
      textarea { min-height: 110px; font-size: 0.86rem; padding: 13px 15px; }
      .btn-pick { padding: 15px 16px; font-size: 0.66rem; letter-spacing: 0.18em; }
      .draw-stage { padding: 34px 16px 30px; min-height: 360px; gap: 10px; }
      .placeholder-logo { width: 64px; }
      .cycling-name { font-size: clamp(1.8rem, 8.5vw, 2.6rem); }
      .winner-logo { width: 62px; }
      .winner-title { font-size: clamp(0.52rem, 2.8vw, 0.66rem); letter-spacing: 0.26em; }
      .winner-name { font-size: clamp(2.4rem, 10.5vw, 3.8rem); padding: 0 8px; }
      .winner-name::before, .winner-name::after { margin: 12px auto; width: 52%; }
      .giveaway-label { font-size: clamp(0.42rem, 1.8vw, 0.52rem); letter-spacing: 0.18em; }
    }
    @media (max-width: 390px) {
      main { padding-left: 10px; padding-right: 10px; }
      .draw-stage { padding: 28px 12px 24px; min-height: 320px; }
      .winner-name { font-size: clamp(2rem, 11vw, 3rem); }
    }
  </style>
</head>

  <script>
    const nameInput        = document.getElementById('nameInput');
    const nameCount        = document.getElementById('nameCount');
    const btnPick          = document.getElementById('btnPick');
    const drawStage        = document.getElementById('drawStage');
    const placeholderState = document.getElementById('placeholderState');
    const drawLabel        = document.getElementById('drawLabel');
    const cyclingName      = document.getElementById('cyclingName');
    const winnerName       = document.getElementById('winnerName');
    const winnerTitle      = document.getElementById('winnerTitle');
    const winnerLogo       = document.getElementById('winnerLogo');
    const giveawayLabel    = document.getElementById('giveawayLabel');
    const confettiBurst    = document.getElementById('confettiBurst');

    let names     = [];
    let isDrawing = false;

    function parseNames(raw) {
      return raw.split('\n').map(n => n.trim()).filter(n => n.length > 0);
    }
    function syncNames() {
      names = parseNames(nameInput.value);
      nameCount.querySelector('span').textContent = names.length;
      btnPick.disabled = names.length < 2 || isDrawing;
    }
    nameInput.addEventListener('input',  syncNames);
    nameInput.addEventListener('change', syncNames);
    nameInput.addEventListener('keyup',  syncNames);
    nameInput.addEventListener('paste',  () => setTimeout(syncNames, 0));

    btnPick.addEventListener('click', () => { syncNames(); startDraw(); });

    function startDraw() {
      if (names.length < 2) return;
      isDrawing = true;
      btnPick.disabled = true;

      placeholderState.style.display = 'none';
      winnerLogo.style.display       = 'none';
      winnerTitle.style.display      = 'none';
      winnerName.style.display       = 'none';
      giveawayLabel.style.display    = 'none';
      drawStage.classList.remove('won');
      confettiBurst.innerHTML        = '';

      drawLabel.style.display   = 'block';
      drawLabel.textContent     = 'Drawing\u2026';
      cyclingName.style.display = 'block';
      cyclingName.style.opacity = '1';

      const TOTAL_MS  = 5000;
      const startTime = Date.now();
      let done = false;

      function step() {
        if (done) return;
        const elapsed  = Date.now() - startTime;
        const progress = Math.min(elapsed / TOTAL_MS, 1);
        cyclingName.textContent   = names[Math.floor(Math.random() * names.length)];
        cyclingName.style.opacity = String(Math.max(0.3, 1 - progress * 0.6));
        if (progress >= 1) { done = true; finishDraw(); return; }
        let interval;
        if (progress < 0.6) { interval = 50; }
        else { const t = (progress - 0.6) / 0.4; interval = Math.round(50 + 380 * Math.pow(t, 2.2)); }
        setTimeout(step, interval);
      }
      setTimeout(() => { if (!done) { done = true; finishDraw(); } }, TOTAL_MS + 700);
      step();
    }

    function finishDraw() {
      const winner = names[Math.floor(Math.random() * names.length)];
      drawLabel.style.display   = 'none';
      cyclingName.style.display = 'none';
      [winnerLogo, winnerTitle, winnerName, giveawayLabel].forEach(el => {
        el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
      });
      winnerLogo.style.display    = 'block';
      winnerTitle.style.display   = 'block';
      winnerName.textContent      = winner;
      winnerName.style.display    = 'block';
      giveawayLabel.style.display = 'block';
      drawStage.classList.add('won');
      spawnCelebration();
      isDrawing        = false;
      btnPick.disabled = names.length < 2;
    }

    /* Confetti recoloured to brand palette: golds, inks, warm papers */
    const CONFETTI_COLORS = [
      '#9D8D61','#B4A67E','#C8BB92','#D8CBA6',
      '#1A1A1A','#3A362E',
      '#F4EFE3','#ECE6D8','#FAF7F1'
    ];

    function spawnCelebration() {
      confettiBurst.innerHTML = '';
      for (let i = 0; i < 180; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 5 + Math.random() * 10;
        const tall = Math.random() > 0.45;
        const dur  = 1.8 + Math.random() * 2.4;
        const del  = Math.random() * 1.0;
        const col  = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        p.style.cssText = [
          `left:${Math.random() * 100}%`,
          `top:${-20 - Math.random() * 20}px`,
          `width:${size}px`,
          `height:${tall ? size * 2.5 : size}px`,
          `background:${col}`,
          `border-radius:${Math.random() > 0.4 ? '50%' : '0'}`,
          `transform:rotate(${Math.random() * 360}deg)`,
          `animation:fall ${dur}s ${del}s linear forwards`,
        ].join(';');
        confettiBurst.appendChild(p);
      }
      const positions = [[20,20],[80,15],[50,10],[15,50],[85,45],[50,35]];
      positions.forEach(([cx, cy], i) => { setTimeout(() => launchFirework(cx, cy), i * 250); });
    }

    function launchFirework(cx, cy) {
      const color  = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const color2 = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const count  = 22;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2;
        const dist  = 55 + Math.random() * 90;
        const dur   = 700 + Math.random() * 500;
        const size  = 4 + Math.random() * 7;
        const fw    = document.createElement('div');
        fw.style.cssText = [
          'position:absolute', `left:${cx}%`, `top:${cy}%`,
          `width:${size}px`, `height:${size}px`,
          `background:${i % 2 === 0 ? color : color2}`,
          'border-radius:50%', 'pointer-events:none',
        ].join(';');
        confettiBurst.appendChild(fw);
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist;
        fw.animate([
          { transform: 'translate(0,0) scale(0)',                          opacity: 1 },
          { transform: `translate(${tx}px,${ty}px) scale(1)`,              opacity: 0.9, offset: 0.55 },
          { transform: `translate(${tx*1.3}px,${ty*1.3+20}px) scale(0.2)`, opacity: 0 },
        ], { duration: dur, fill: 'forwards', easing: 'ease-out' });
      }
    }
  </script>
</body>
</html>
